steps:
  # Build and deploy single combined container
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "gcr.io/$PROJECT_ID/inclusiview:$SHORT_SHA"
      - "-f"
      - "Dockerfile"
      - "."

  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/inclusiview:$SHORT_SHA"

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "inclusiview"
      - "--image=gcr.io/$PROJECT_ID/inclusiview:$SHORT_SHA"
      - "--region=us-central1"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--memory=512Mi"
      - "--timeout=60s"
      - "--concurrency=80"
      - "--min-instances=0"
      - "--max-instances=1"
      - "--set-env-vars=OPENROUTER_API_KEY=${_OPENROUTER_API_KEY}"
      - "--set-env-vars=OPENROUTER_MODEL=${_OPENROUTER_MODEL}"
      - "--set-env-vars=DATABASE_URL=sqlite:///app/inclusiview.db"

substitutions:
  _OPENROUTER_API_KEY: "your-key-here"
  _OPENROUTER_MODEL: "openai/gpt-4o-mini"

options:
  logging: CLOUD_LOGGING_ONLY
